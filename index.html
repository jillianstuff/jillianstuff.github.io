<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataForge — Excel → Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #2a2a3a;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #f0f0f8;
    --muted: #6a6a88;
    --danger: #ff4747;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* Header */
  header {
    padding: 3rem 0 2rem;
    display: flex;
    align-items: flex-end;
    gap: 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 3rem;
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    background: var(--accent);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 28px; height: 28px; }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  /* Steps layout */
  .steps {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.75rem;
    position: relative;
    transition: border-color 0.2s;
  }

  .step:hover { border-color: var(--accent); }

  .step-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .step h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: rgba(232,255,71,0.02);
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.05);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .upload-zone p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .upload-zone .file-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    margin-top: 0.5rem;
    word-break: break-all;
  }

  /* Controls */
  .control-group { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
  }

  select, input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
    outline: none;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  /* Column selectors */
  .col-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  /* Run button */
  .step.full {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .run-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 0.85rem 2rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .run-btn:hover:not(:disabled) {
    background: #fff;
    transform: translateY(-1px);
  }

  .run-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .run-btn .spinner {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  .run-btn.loading .spinner { display: block; }
  .run-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status bar */
  .status-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .status-dot.ready { background: var(--accent2); }
  .status-dot.error { background: var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Output section */
  .output-section {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    display: none;
  }

  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .output-header h2 {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .download-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    background: none;
    border: 1px solid var(--accent2);
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .download-btn:hover {
    background: var(--accent2);
    color: var(--bg);
  }

  #chart-output {
    width: 100%;
    border: 1px solid var(--border);
  }

  /* Error output */
  .error-box {
    background: rgba(255,71,71,0.08);
    border: 1px solid var(--danger);
    padding: 1rem 1.25rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--danger);
    white-space: pre-wrap;
    display: none;
    margin-top: 1rem;
  }

  .error-box.visible { display: block; }

  /* Preview table */
  .preview-wrap {
    overflow-x: auto;
    max-height: 200px;
    overflow-y: auto;
    display: none;
    margin-top: 1rem;
  }

  .preview-wrap.visible { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
  }

  th {
    background: var(--bg);
    color: var(--accent);
    padding: 0.4rem 0.75rem;
    text-align: left;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 0.35rem 0.75rem;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    color: var(--muted);
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="14" width="5" height="12" fill="#0a0a0f"/>
        <rect x="9" y="8" width="5" height="18" fill="#0a0a0f"/>
        <rect x="16" y="4" width="5" height="22" fill="#0a0a0f"/>
        <polyline points="4,13 11,7 18,3 25,8" stroke="#0a0a0f" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="tagline">Python · Pyodide · In-browser</div>
      <h1>Data<span>Forge</span></h1>
    </div>
  </header>

  <div class="steps">
    <!-- Step 1: Upload -->
    <div class="step">
      <div class="step-num">01 — Upload</div>
      <h2>Drop your Excel file</h2>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
        <div class="upload-icon">📊</div>
        <strong>Click or drag file here</strong>
        <p>.xlsx · .xls · .csv</p>
        <div class="file-name" id="fileName"></div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <table id="previewTable"></table>
      </div>
    </div>

    <!-- Step 2: Configure -->
    <div class="step">
      <div class="step-num">02 — Configure</div>
      <h2>Choose chart settings</h2>

      <div class="control-group">
        <label>Chart Type</label>
        <select id="chartType">
          <option value="bar">Bar Chart</option>
          <option value="line">Line Chart</option>
          <option value="scatter">Scatter Plot</option>
          <option value="histogram">Histogram</option>
          <option value="pie">Pie Chart</option>
          <option value="box">Box Plot</option>
        </select>
      </div>

      <div class="col-row">
        <div class="control-group">
          <label>X Column</label>
          <select id="xCol"><option value="">— select —</option></select>
        </div>
        <div class="control-group">
          <label>Y Column</label>
          <select id="yCol"><option value="">— select —</option></select>
        </div>
      </div>

      <div class="control-group">
        <label>Chart Title</label>
        <input type="text" id="chartTitle" placeholder="My Chart" />
      </div>

      <div class="control-group">
        <label>Color Palette</label>
        <select id="palette">
          <option value="plasma">Plasma</option>
          <option value="viridis">Viridis</option>
          <option value="cividis">Cividis</option>
          <option value="inferno">Inferno</option>
          <option value="tab10">Classic Tab10</option>
        </select>
      </div>
    </div>

    <!-- Step 3: Run -->
    <div class="step full">
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Loading Python runtime…</span>
      </div>
      <button class="run-btn" id="runBtn" disabled>
        <div class="spinner"></div>
        <span class="btn-text">▶ Generate Graph</span>
      </button>
    </div>
  </div>

  <!-- Output -->
  <div class="output-section" id="outputSection">
    <div class="output-header">
      <h2>Output — Graph</h2>
      <button class="download-btn" id="downloadBtn">↓ Download PNG</button>
    </div>
    <img id="chart-output" alt="Generated chart" />
    <div class="error-box" id="errorBox"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────
let pyodide = null;
let fileData = null;
let columns = [];
let chartDataUrl = null;

// ─── DOM refs ────────────────────────────────────────────────────
const fileInput   = document.getElementById('fileInput');
const fileName    = document.getElementById('fileName');
const uploadZone  = document.getElementById('uploadZone');
const previewWrap = document.getElementById('previewWrap');
const previewTable= document.getElementById('previewTable');
const xColSel     = document.getElementById('xCol');
const yColSel     = document.getElementById('yCol');
const chartType   = document.getElementById('chartType');
const chartTitle  = document.getElementById('chartTitle');
const palette     = document.getElementById('palette');
const runBtn      = document.getElementById('runBtn');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const outputSection= document.getElementById('outputSection');
const chartOutput = document.getElementById('chart-output');
const errorBox    = document.getElementById('errorBox');
const downloadBtn = document.getElementById('downloadBtn');

// ─── Status helpers ───────────────────────────────────────────────
function setStatus(state, msg) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = msg;
}

// ─── Load Pyodide ────────────────────────────────────────────────
async function initPyodide() {
  setStatus('loading', 'Loading Python runtime (first load ~5s)…');
  try {
    pyodide = await loadPyodide();
    await pyodide.loadPackage(['micropip', 'numpy', 'pandas', 'matplotlib', 'openpyxl']);
    setStatus('ready', 'Python ready — upload a file to begin');
    runBtn.disabled = !fileData;
  } catch (e) {
    setStatus('error', 'Failed to load Python: ' + e.message);
  }
}

// ─── File handling ────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx','xls','csv'].includes(ext)) {
    alert('Please upload an .xlsx, .xls, or .csv file.');
    return;
  }
  fileName.textContent = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    fileData = { name: file.name, ext, data: e.target.result };
    if (pyodide) {
      setStatus('loading', 'Parsing file…');
      loadDataPreview().then(() => {
        setStatus('ready', 'File loaded — configure and generate');
        runBtn.disabled = false;
      }).catch(err => {
        setStatus('error', 'Parse error: ' + err);
      });
    }
  };
  if (ext === 'csv') {
    reader.readAsText(file);
  } else {
    reader.readAsArrayBuffer(file);
  }
}

fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ─── Preview + column loading ──────────────────────────────────────
async function loadDataPreview() {
  const { name, ext, data } = fileData;
  let pyScript;

  if (ext === 'csv') {
    pyodide.globals.set('csv_text', data);
    pyScript = `
import pandas as pd, io, json
df = pd.read_csv(io.StringIO(csv_text))
cols = df.columns.tolist()
preview = df.head(8).astype(str).values.tolist()
result = json.dumps({"cols": cols, "preview": preview})
result
`;
  } else {
    const uint8 = new Uint8Array(data);
    pyodide.globals.set('xlsx_bytes', uint8.tobytes ? uint8 : Array.from(uint8));
    pyodide.runPython(`
import js
raw = js.Uint8Array.new(${JSON.stringify(Array.from(uint8))})
`);
    pyodide.globals.set('_xlsx_arr', uint8);
    pyScript = `
import pandas as pd, io, json, js
import numpy as np
buf = bytes(_xlsx_arr.to_py())
df = pd.read_excel(io.BytesIO(buf), engine='openpyxl')
cols = df.columns.tolist()
preview = df.head(8).astype(str).values.tolist()
result = json.dumps({"cols": cols, "preview": preview})
result
`;
  }

  // Pass xlsx bytes via pyodide buffer
  if (ext !== 'csv') {
    const uint8 = new Uint8Array(data);
    pyodide.globals.set('_xlsx_arr', uint8);
    pyScript = `
import pandas as pd, io, json
buf = bytes(_xlsx_arr.to_py())
df = pd.read_excel(io.BytesIO(buf), engine='openpyxl')
cols = df.columns.tolist()
preview = df.head(8).astype(str).values.tolist()
result = json.dumps({"cols": cols, "preview": preview})
result
`;
  }

  const resultStr = await pyodide.runPythonAsync(pyScript);
  const result = JSON.parse(resultStr);
  columns = result.cols;

  // Populate column selectors
  [xColSel, yColSel].forEach((sel, i) => {
    sel.innerHTML = '<option value="">— select —</option>';
    columns.forEach((c, ci) => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      if (ci === i) opt.selected = true;
      sel.appendChild(opt);
    });
  });

  // Render preview table
  previewTable.innerHTML = '';
  const thead = previewTable.createTHead();
  const hr = thead.insertRow();
  columns.forEach(c => { const th = document.createElement('th'); th.textContent = c; hr.appendChild(th); });
  const tbody = previewTable.createTBody();
  result.preview.forEach(row => {
    const tr = tbody.insertRow();
    row.forEach(cell => { const td = tr.insertCell(); td.textContent = cell; });
  });
  previewWrap.classList.add('visible');
}

// ─── Generate chart ───────────────────────────────────────────────
async function generateChart() {
  if (!pyodide || !fileData) return;

  const xCol = xColSel.value;
  const yCol = yColSel.value;
  const type = chartType.value;
  const title = chartTitle.value || 'Chart';
  const pal = palette.value;
  const { ext, data } = fileData;

  runBtn.classList.add('loading');
  runBtn.disabled = true;
  errorBox.classList.remove('visible');
  outputSection.classList.remove('visible');

  try {
    let loadDf;
    if (ext === 'csv') {
      pyodide.globals.set('csv_text', data);
      loadDf = `df = pd.read_csv(io.StringIO(csv_text))`;
    } else {
      const uint8 = new Uint8Array(data);
      pyodide.globals.set('_xlsx_arr', uint8);
      loadDf = `df = pd.read_excel(io.BytesIO(bytes(_xlsx_arr.to_py())), engine='openpyxl')`;
    }

    pyodide.globals.set('_xcol', xCol);
    pyodide.globals.set('_ycol', yCol);
    pyodide.globals.set('_title', title);
    pyodide.globals.set('_palette', pal);
    pyodide.globals.set('_type', type);

    const pyCode = `
import pandas as pd, io, base64, json, matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt
import matplotlib.cm as cm
import numpy as np

${loadDf}

xcol = _xcol
ycol = _ycol
title = _title
palette = _palette
chart_type = _type

# Matplotlib style
plt.rcParams.update({
    'figure.facecolor': '#111118',
    'axes.facecolor':   '#0a0a0f',
    'axes.edgecolor':   '#2a2a3a',
    'axes.labelcolor':  '#f0f0f8',
    'text.color':       '#f0f0f8',
    'xtick.color':      '#6a6a88',
    'ytick.color':      '#6a6a88',
    'grid.color':       '#1e1e2e',
    'grid.linewidth':   0.6,
    'font.family':      'monospace',
    'axes.titleweight': 'bold',
    'axes.titlesize':   13,
    'axes.titlepad':    14,
    'axes.titlecolor':  '#e8ff47',
})

fig, ax = plt.subplots(figsize=(9, 5))
fig.patch.set_linewidth(0)

cmap = cm.get_cmap(palette)
n = min(len(df), 50)

if chart_type == 'bar':
    x_data = df[xcol].astype(str) if xcol else df.index.astype(str)
    y_data = pd.to_numeric(df[ycol], errors='coerce') if ycol else df.iloc[:,1]
    colors = [cmap(i/max(len(x_data)-1,1)) for i in range(len(x_data))]
    bars = ax.bar(x_data, y_data, color=colors, edgecolor='none', zorder=3)
    ax.set_xlabel(xcol); ax.set_ylabel(ycol)
    if len(x_data) > 10:
        plt.xticks(rotation=45, ha='right', fontsize=7)
    ax.grid(axis='y', zorder=1)

elif chart_type == 'line':
    x_data = pd.to_numeric(df[xcol], errors='coerce') if xcol else df.index
    y_data = pd.to_numeric(df[ycol], errors='coerce') if ycol else df.iloc[:,1]
    line_color = cmap(0.7)
    ax.plot(x_data, y_data, color=line_color, linewidth=2, zorder=3)
    ax.fill_between(x_data, y_data, alpha=0.12, color=line_color, zorder=2)
    ax.scatter(x_data, y_data, color=line_color, s=30, zorder=4, edgecolors='none')
    ax.set_xlabel(xcol); ax.set_ylabel(ycol)
    ax.grid(zorder=1)

elif chart_type == 'scatter':
    x_data = pd.to_numeric(df[xcol], errors='coerce') if xcol else df.iloc[:,0]
    y_data = pd.to_numeric(df[ycol], errors='coerce') if ycol else df.iloc[:,1]
    sc = ax.scatter(x_data, y_data, c=np.arange(len(x_data)), cmap=palette,
                    s=50, alpha=0.85, edgecolors='none', zorder=3)
    plt.colorbar(sc, ax=ax, pad=0.02)
    ax.set_xlabel(xcol); ax.set_ylabel(ycol)
    ax.grid(zorder=1)

elif chart_type == 'histogram':
    col = ycol if ycol else xcol
    data_h = pd.to_numeric(df[col], errors='coerce').dropna()
    n_bins = min(30, max(10, len(data_h)//10))
    counts, bins, patches = ax.hist(data_h, bins=n_bins, edgecolor='none', zorder=3)
    for i, p in enumerate(patches):
        p.set_facecolor(cmap(i / max(len(patches)-1, 1)))
    ax.set_xlabel(col); ax.set_ylabel('Frequency')
    ax.grid(axis='y', zorder=1)

elif chart_type == 'pie':
    col = ycol if ycol else xcol
    labels_col = xcol if xcol else df.columns[0]
    vals = pd.to_numeric(df[col], errors='coerce').fillna(0).head(12)
    labels = df[labels_col].astype(str).head(12)
    colors = [cmap(i/max(len(vals)-1,1)) for i in range(len(vals))]
    wedge_props = dict(linewidth=1.5, edgecolor='#111118')
    ax.pie(vals, labels=labels, colors=colors, autopct='%1.1f%%',
           wedgeprops=wedge_props, textprops={'fontsize':8})
    ax.axis('equal')

elif chart_type == 'box':
    cols_to_plot = [ycol] if ycol else [c for c in df.columns if pd.to_numeric(df[c], errors='coerce').notna().sum() > 2]
    data_box = [pd.to_numeric(df[c], errors='coerce').dropna() for c in cols_to_plot[:8]]
    bp = ax.boxplot(data_box, labels=cols_to_plot[:8], patch_artist=True, zorder=3,
                    medianprops=dict(color='#e8ff47', linewidth=2),
                    whiskerprops=dict(color='#6a6a88'),
                    capprops=dict(color='#6a6a88'),
                    flierprops=dict(markerfacecolor='#ff4747', markersize=4, linestyle='none'))
    for i, patch in enumerate(bp['boxes']):
        patch.set_facecolor(cmap(i/max(len(bp['boxes'])-1,1)))
        patch.set_alpha(0.75)
    ax.grid(axis='y', zorder=1)

ax.set_title(title)
plt.tight_layout(pad=1.2)

buf = io.BytesIO()
plt.savefig(buf, format='png', dpi=150, bbox_inches='tight',
            facecolor=fig.get_facecolor())
plt.close()
buf.seek(0)
img_b64 = base64.b64encode(buf.read()).decode()
'data:image/png;base64,' + img_b64
`;

    const result = await pyodide.runPythonAsync(pyCode);
    chartDataUrl = result;
    chartOutput.src = result;
    outputSection.classList.add('visible');
    setStatus('ready', 'Chart generated successfully');

  } catch (err) {
    errorBox.textContent = err.toString();
    errorBox.classList.add('visible');
    outputSection.classList.add('visible');
    setStatus('error', 'Error generating chart');
  } finally {
    runBtn.classList.remove('loading');
    runBtn.disabled = false;
  }
}

// ─── Download ─────────────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  if (!chartDataUrl) return;
  const a = document.createElement('a');
  a.href = chartDataUrl;
  a.download = (chartTitle.value || 'chart') + '.png';
  a.click();
});

runBtn.addEventListener('click', generateChart);

// ─── Init ─────────────────────────────────────────────────────────
initPyodide().then(() => {
  if (fileData) { loadDataPreview(); runBtn.disabled = false; }
});
</script>
