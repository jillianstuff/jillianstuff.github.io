<!DOCTYPE html>
<html>
<head>
  <title>Excel Graph Generator</title>
</head>
<body>
  <h2>Upload Excel File to Generate Graph</h2>

  <form id="uploadForm">
    <input type="file" id="fileInput" accept=".xlsx" required />
    <button type="submit">Generate Graph</button>
  </form>

  <p id="status"></p>

  <script>
    const form = document.getElementById("uploadForm");
    const statusText = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = document.getElementById("fileInput").files[0];
      if (!file) {
        statusText.innerText = "Please select a file.";
        return;
      }

      const reader = new FileReader();
      reader.onload = async () => {
        const base64Content = reader.result.split(",")[1];

        const response = await fetch(
          "https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/dispatches",
          {
            method: "POST",
            headers: {
              "Authorization": "Bearer YOUR_GITHUB_TOKEN",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              event_type: "process_excel_graph",
              client_payload: {
                file_name: file.name,
                file_content: base64Content
              }
            })
          }
        );

        if (response.ok) {
          statusText.innerText =
            "Processing started. Check GitHub Actions for the generated graph.";
        } else {
          statusText.innerText = "Upload failed.";
        }
      };

      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
